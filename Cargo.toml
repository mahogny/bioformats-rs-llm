bioformats-legacy       = { path = "crates/bioformats-legacy", version = "0.1.0" }
bioformats-xrm          = { path = "crates/bioformats-xrm", version = "0.1.0" }
bioformats-tiff-wrappers = { path = "crates/bioformats-tiff-wrappers", version = "0.1.0" }
bioformats-misc          = { path = "crates/bioformats-misc", version = "0.1.0" }
bioformats-extended      = { path = "crates/bioformats-extended", version = "0.1.0" }
bioformats-hcs2          = { path = "crates/bioformats-hcs2", version = "0.1.0" }
bioformats-sem           = { path = "crates/bioformats-sem", version = "0.1.0" }
