bioformats-deltavision  = { path = "crates/bioformats-deltavision" }
bioformats-spe          = { path = "crates/bioformats-spe" }
bioformats-andor        = { path = "crates/bioformats-andor" }
bioformats-amira        = { path = "crates/bioformats-amira" }
bioformats-imagic       = { path = "crates/bioformats-imagic" }
bioformats-olympus      = { path = "crates/bioformats-olympus" }
bioformats-flim         = { path = "crates/bioformats-flim" }
bioformats-clinical     = { path = "crates/bioformats-clinical" }
bioformats-norpix       = { path = "crates/bioformats-norpix" }
bioformats-ome          = { path = "crates/bioformats-ome" }
bioformats-hamamatsu    = { path = "crates/bioformats-hamamatsu" }
bioformats-pcx          = { path = "crates/bioformats-pcx" }
bioformats-photoshop    = { path = "crates/bioformats-photoshop" }
bioformats-simfcs       = { path = "crates/bioformats-simfcs" }
bioformats-svs          = { path = "crates/bioformats-svs" }
bioformats-prairie      = { path = "crates/bioformats-prairie" }
bioformats-eps          = { path = "crates/bioformats-eps" }
bioformats-afm          = { path = "crates/bioformats-afm" }
bioformats-lim          = { path = "crates/bioformats-lim" }
bioformats-aim          = { path = "crates/bioformats-aim" }
bioformats-zip          = { path = "crates/bioformats-zip" }
bioformats-fake         = { path = "crates/bioformats-fake" }
bioformats-viff         = { path = "crates/bioformats-viff" }
bioformats-incell       = { path = "crates/bioformats-incell" }
bioformats-visitech     = { path = "crates/bioformats-visitech" }
bioformats-perkinelmer  = { path = "crates/bioformats-perkinelmer" }
