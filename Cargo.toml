bioformats-avi          = { path = "crates/bioformats-avi" }
bioformats-lei          = { path = "crates/bioformats-lei" }
bioformats-flex         = { path = "crates/bioformats-flex" }
bioformats-volocity     = { path = "crates/bioformats-volocity" }
bioformats-opus         = { path = "crates/bioformats-opus" }
bioformats-legacy       = { path = "crates/bioformats-legacy" }
bioformats-xrm          = { path = "crates/bioformats-xrm" }
bioformats-tiff-wrappers = { path = "crates/bioformats-tiff-wrappers" }
bioformats-misc          = { path = "crates/bioformats-misc" }
bioformats-extended      = { path = "crates/bioformats-extended" }
bioformats-hcs2          = { path = "crates/bioformats-hcs2" }
bioformats-sem           = { path = "crates/bioformats-sem" }
bioformats-spm           = { path = "crates/bioformats-spm" }
bioformats-camera2       = { path = "crates/bioformats-camera2" }
bioformats-flim2         = { path = "crates/bioformats-flim2" }
bioformats-misc4         = { path = "crates/bioformats-misc4" }
bioformats-imaris        = { path = "crates/bioformats-imaris" }
bioformats-bdv           = { path = "crates/bioformats-bdv" }
bioformats-cellh5        = { path = "crates/bioformats-cellh5" }
bioformats-zvi           = { path = "crates/bioformats-zvi" }
thiserror = { workspace = true }
log = { workspace = true }

[[bench]]
name = "read_ome_tiff"
harness = false

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
