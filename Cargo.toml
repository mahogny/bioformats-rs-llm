bioformats-metamorph = { path = "crates/bioformats-metamorph", version = "0.1.0" }
bioformats-micromanager = { path = "crates/bioformats-micromanager", version = "0.1.0" }
bioformats-biorad       = { path = "crates/bioformats-biorad", version = "0.1.0" }
bioformats-deltavision  = { path = "crates/bioformats-deltavision", version = "0.1.0" }
bioformats-spe          = { path = "crates/bioformats-spe", version = "0.1.0" }
bioformats-andor        = { path = "crates/bioformats-andor", version = "0.1.0" }
bioformats-amira        = { path = "crates/bioformats-amira", version = "0.1.0" }
bioformats-imagic       = { path = "crates/bioformats-imagic", version = "0.1.0" }
bioformats-olympus      = { path = "crates/bioformats-olympus", version = "0.1.0" }
bioformats-flim         = { path = "crates/bioformats-flim", version = "0.1.0" }
bioformats-clinical     = { path = "crates/bioformats-clinical", version = "0.1.0" }
bioformats-norpix       = { path = "crates/bioformats-norpix", version = "0.1.0" }
bioformats-ome          = { path = "crates/bioformats-ome", version = "0.1.0" }
bioformats-hamamatsu    = { path = "crates/bioformats-hamamatsu", version = "0.1.0" }
bioformats-pcx          = { path = "crates/bioformats-pcx", version = "0.1.0" }
