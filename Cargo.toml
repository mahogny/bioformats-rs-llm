bioformats-prairie      = { path = "crates/bioformats-prairie", version = "0.1.0" }
bioformats-eps          = { path = "crates/bioformats-eps", version = "0.1.0" }
bioformats-afm          = { path = "crates/bioformats-afm", version = "0.1.0" }
bioformats-lim          = { path = "crates/bioformats-lim", version = "0.1.0" }
bioformats-aim          = { path = "crates/bioformats-aim", version = "0.1.0" }
bioformats-zip          = { path = "crates/bioformats-zip", version = "0.1.0" }
bioformats-fake         = { path = "crates/bioformats-fake", version = "0.1.0" }
bioformats-viff         = { path = "crates/bioformats-viff", version = "0.1.0" }
