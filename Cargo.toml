[package]
name = "bioformats"
version = "0.1.0"
edition = "2021"
description = "Pure Rust reimplementation of Bio-Formats — read/write scientific image formats"
license = "GPL 2.0 with some BSD components"
homepage = "https://www.openmicroscopy.org/bio-formats/"

[workspace]
members = [
    "crates/bioformats-common",
    "crates/bioformats-tiff",
    "crates/bioformats-png",
    "crates/bioformats-jpeg",
    "crates/bioformats-bmp",
    "crates/bioformats-czi",
    "crates/bioformats-raster",
    "crates/bioformats-ics",
    "crates/bioformats-mrc",
    "crates/bioformats-fits",
    "crates/bioformats-nrrd",
    "crates/bioformats-metaimage",
    "crates/bioformats-lif",
    "crates/bioformats-nd2",
    "crates/bioformats-dicom",
    "crates/bioformats-nifti",
    "crates/bioformats-gatan",
    "crates/bioformats-lsm",
    "crates/bioformats-metamorph",
    "crates/bioformats-micromanager",
    "crates/bioformats-biorad",
    "crates/bioformats-deltavision",
    "crates/bioformats-spe",
    "crates/bioformats-andor",
    "crates/bioformats-amira",
    "crates/bioformats-imagic",
    "crates/bioformats-olympus",
    "crates/bioformats-flim",
    "crates/bioformats-clinical",
    "crates/bioformats-norpix",
    "crates/bioformats-ome",
    "crates/bioformats-hamamatsu",
    "crates/bioformats-pcx",
    "crates/bioformats-photoshop",
    "crates/bioformats-simfcs",
    "crates/bioformats-svs",
    "crates/bioformats-prairie",
    "crates/bioformats-eps",
    "crates/bioformats-afm",
    "crates/bioformats-lim",
    "crates/bioformats-aim",
    "crates/bioformats-zip",
    "crates/bioformats-fake",
    "crates/bioformats-viff",
    "crates/bioformats-incell",
    "crates/bioformats-visitech",
    "crates/bioformats-perkinelmer",
    "crates/bioformats-mias",
    "crates/bioformats-avi",
    "crates/bioformats-lei",
    "crates/bioformats-flex",
    "crates/bioformats-volocity",
    "crates/bioformats-opus",
    "crates/bioformats-legacy",
    "crates/bioformats-xrm",
    "crates/bioformats-tiff-wrappers",
    "crates/bioformats-misc",
    "crates/bioformats-extended",
    "crates/bioformats-hcs2",
    "crates/bioformats-sem",
    "crates/bioformats-spm",
    "crates/bioformats-camera2",
    "crates/bioformats-flim2",
    "crates/bioformats-misc4",
    "crates/bioformats-imaris",
    "crates/bioformats-bdv",
    "crates/bioformats-cellh5",
    "crates/bioformats-zvi",
]
resolver = "2"

[workspace.dependencies]
hdf5 = { package = "hdf5-metno", version = "0.12" }
thiserror = "1"
zip = "2"
byteorder = "1"
flate2 = "1"
weezl = "0.1"
jpeg-decoder = "0.3"
zstd = "0.13"
memmap2 = "0.9"
image = { version = "0.25", default-features = false }
log = "0.4"
quick-xml = "0.37"
encoding_rs = "0.8"
cfb = "0.10"

[dependencies]
bioformats-common    = { path = "crates/bioformats-common", version = "0.1.0" }
bioformats-tiff      = { path = "crates/bioformats-tiff", version = "0.1.0" }
bioformats-png       = { path = "crates/bioformats-png", version = "0.1.0" }
bioformats-jpeg      = { path = "crates/bioformats-jpeg", version = "0.1.0" }
bioformats-bmp       = { path = "crates/bioformats-bmp", version = "0.1.0" }
bioformats-czi       = { path = "crates/bioformats-czi", version = "0.1.0" }
bioformats-raster    = { path = "crates/bioformats-raster", version = "0.1.0" }
bioformats-ics       = { path = "crates/bioformats-ics", version = "0.1.0" }
bioformats-mrc       = { path = "crates/bioformats-mrc", version = "0.1.0" }
bioformats-fits      = { path = "crates/bioformats-fits", version = "0.1.0" }
bioformats-nrrd      = { path = "crates/bioformats-nrrd", version = "0.1.0" }
bioformats-metaimage = { path = "crates/bioformats-metaimage", version = "0.1.0" }
